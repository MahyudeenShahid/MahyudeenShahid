<svg width="495" height="470" viewBox="0 0 495 470" xmlns="http://www.w3.org/2000/svg">
  <!-- Background panel matching your theme -->
  <rect x="0.5" y="0.5" width="494" height="469" rx="8" fill="#030712" stroke="#0D9488" stroke-width="1.5" />

  <!-- Card Title -->
  <text x="25" y="35" fill="#10B981" font-family="'Segoe UI', -apple-system, sans-serif" font-size="14" font-weight="bold">GitHub Statistics</text>

  <!-- Left Stats Grid -->
  <!-- Stars -->
  <text x="25" y="72" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Total Stars Earned:</text>
  <text x="240" y="72" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">14</text>

  <!-- Commits -->
  <text x="25" y="98" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Total Commits (2026):</text>
  <text x="240" y="98" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">314</text>

  <!-- Pull Requests -->
  <text x="25" y="124" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Pull Requests:</text>
  <text x="240" y="124" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">20</text>

  <!-- Issues -->
  <text x="25" y="150" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Issues Opened:</text>
  <text x="240" y="150" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">0</text>

  <!-- Coding Hours -->
  <text x="25" y="176" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Estimated Coding Hours:</text>
  <text x="240" y="176" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">187h</text>

  <!-- Current Streak -->
  <text x="25" y="202" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Current Streak:</text>
  <text x="240" y="202" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">5 days</text>

  <!-- Commits This Week -->
  <text x="25" y="228" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Commits This Week:</text>
  <text x="240" y="228" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">30</text>

  <!-- Weekly Trend -->
  <text x="25" y="254" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Weekly Trend:</text>
  <text x="240" y="254" fill="#10B981" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">+2900% commits</text>

  <!-- Avg Commits / Day -->
  <text x="25" y="280" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Avg Commits / Day:</text>
  <text x="240" y="280" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">1.7</text>

  <!-- Most Active Day -->
  <text x="25" y="306" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Most Active Day:</text>
  <text x="240" y="306" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">Tuesday</text>

  <!-- Activity Grade -->
  <text x="25" y="332" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Activity Grade:</text>
  <text x="240" y="332" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">A</text>

  <!-- Contributions This Year -->
  <text x="25" y="358" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Contributions This Year:</text>
  <text x="240" y="358" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">639</text>

  <!-- Public Repositories -->
  <text x="25" y="384" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Public Repos:</text>
  <text x="240" y="384" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">35</text>

  <!-- Followers -->
  <text x="25" y="410" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="500">Followers:</text>
  <text x="240" y="410" fill="#F8FAFC" font-family="'Segoe UI', -apple-system, sans-serif" font-size="12" font-weight="bold" text-anchor="end">2</text>

  <!-- Right Grade Circle Infographic -->
  <g transform="translate(360, 240)">
    <circle cx="0" cy="0" r="38" fill="none" stroke="rgba(16, 185, 129, 0.1)" stroke-width="6" />
    <circle cx="0" cy="0" r="38" fill="none" stroke="#10B981" stroke-width="6"
            stroke-dasharray="238.76" stroke-dashoffset="52.52"
            stroke-linecap="round" transform="rotate(-90)" />
    <text x="0" y="10" fill="#10B981" font-family="'Segoe UI', -apple-system, sans-serif" font-size="30" font-weight="bold" text-anchor="middle">A</text>
    <text x="0" y="62" fill="#94A3B8" font-family="'Segoe UI', -apple-system, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">RANKING</text>
  </g>
</svg>